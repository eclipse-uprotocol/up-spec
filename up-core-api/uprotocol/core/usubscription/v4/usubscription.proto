syntax = "proto3";

package uprotocol.core.usubscription.v3;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "uprotocol/v1/uri.proto";
import "uprotocol/uoptions.proto";

option java_package = "org.eclipse.uprotocol.core.usubscription.v3";
option java_outer_classname = "USubscriptionProto";
option java_multiple_files = true;

// Enable generation of generic service attributes in C++
option cc_generic_services = true;

enum SubscriptionStatus {
  UNSUBSCRIBED = 0;
  SUBSCRIBE_PENDING = 1;
  SUBSCRIBED = 2;
  UNSUBSCRIBE_PENDING = 3;
}

// [dsn->impl:req~usubscription-change-message-type~1]
message Subscription {
  uprotocol.v1.UUri topic = 1;
  uprotocol.v1.UUri subscriber = 2;
  SubscriptionStatus status = 3;
  optional uint64 expire_ms = 4;
  optional uint32 sample_period_ms = 5;
}

// [dsn->impl:req~usubscription-subscribe-request-signature~1]
message SubscribeRequest {
  uprotocol.v1.UUri topic = 1;
  optional uint64 expire_ms = 2;
  optional uint32 sample_period_ms = 3;
}

// [dsn->impl:req~usubscription-subscribe-response-signature~1]
message SubscribeResponse {
  uprotocol.v1.UUri topic = 1;
  SubscriptionStatus status = 2;
}

// [dsn->impl:req~usubscription-unsubscribe-request-signature~1]
message UnsubscribeRequest {
  uprotocol.v1.UUri topic = 1;
}

// [dsn->impl:req~usubscription-unsubscribe-response-signature~1]
message UnsubscribeResponse {}

// [dsn->impl:req~usubscription-fetch-subscriptions-request-signature~1]
message FetchSubscriptionsRequest {
  uprotocol.v1.UUri topic_filter = 1;
  uprotocol.v1.UUri subscriber_filter = 2;
}

// [dsn->impl:req~usubscription-fetch-subscriptions-response-signature~1]
message FetchSubscriptionsResponse {
  repeated Subscription subscriptions = 1;
}
message NotificationsRequest {
  uprotocol.v1.UUri topic = 1;
}

message NotificationsResponse {}

message ResetRequest {
  optional string message = 1;
}

message ResetResponse {}
