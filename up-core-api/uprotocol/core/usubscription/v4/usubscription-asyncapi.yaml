asyncapi: '3.0.0'
id: urn:eclipse:org:uprotocol:usubscription
info:
  title: Eclipse uProtocol uSubscription service API definition
  version: '1.0.0'
  description: |
    uProtocol service for managing x-system pub/sub subscriptions.
  contact:
    name: Daniel Krippner
    email: daniel.Krippner@etas.com
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  tags:
    - name: uProtocol uSubscription
  x-uprotocol:
    # [impl->dsn~usubscription-service_name~1]
    serviceName: core.usubscription
    # [impl->dsn~usubscription-uentity_id~1]
    uEntityId: 0x0
    versionMajor: 3
    versionMinor: 0

defaultContentType: "application/protobuf"

channels:
  subscriptionChange:
    summary: Channel for subscription change messages
    messages:
      protobuf:
        contentType: 'application/protobuf'
        payload:
          schemaFormat: 'application/vnd.google.protobuf;version=3'
          schema:
            $ref: './usubscription.proto#/uprotocol.core.usubscription.v3.Subscription'
    x-uprotocol:
      resourceId: 0x8000

  subscribeRequests:
    summary: Client-topic subscription request.
    messages:
      protobuf:
        contentType: 'application/protobuf'
        payload:
          schemaFormat: 'application/vnd.google.protobuf;version=3'
          schema:
            $ref: './usubscription.proto#/uprotocol.core.usubscription.v3.SubscribeRequest'
  subscribeResponses:
    summary: Client-topic subscription status.
    messages:
      protobuf:
        contentType: 'application/protobuf'
        payload:
          schemaFormat: 'application/vnd.google.protobuf;version=3'
          schema:
            $ref: './usubscription.proto#/uprotocol.core.usubscription.v3.SubscribeResponse'
  unsubscribeRequests:
    summary: Client-topic unsubscribe request.
    messages:
      protobuf:
        contentType: 'application/protobuf'
        payload:
          schemaFormat: 'application/vnd.google.protobuf;version=3'
          schema:
            $ref: './usubscription.proto#/uprotocol.core.usubscription.v3.UnsubscribeRequest'
  unsubscribeResponses:
    summary: Client-topic unsubscribe response.
    messages:
      protobuf:
        contentType: 'application/protobuf'
        payload:
          schemaFormat: 'application/vnd.google.protobuf;version=3'
          schema:
            $ref: './usubscription.proto#/uprotocol.core.usubscription.v3.UnsubscribeResponse'

  fetchSubscriptionsRequests:
    summary: Fetch subscription information request.
    # [dsn->impl:req~usubscription-fetch-subscriptions-request-signature~1]
    messages:
      protobuf:
        contentType: 'application/protobuf'
        payload:
          schemaFormat: 'application/vnd.google.protobuf;version=3'
          schema:
            $ref: './usubscription.proto#/uprotocol.core.usubscription.v3.FetchSubscriptionsRequest'
  fetchSubscriptionsResponses:
    summary: Fetch subscription information response.
    # [dsn->impl:req~usubscription-fetch-subscriptions-response-signature~1]
    messages:
      protobuf:
        contentType: 'application/protobuf'
        payload:
          schemaFormat: 'application/vnd.google.protobuf;version=3'
          schema:
            $ref: './usubscription.proto#/uprotocol.core.usubscription.v3.FetchSubscriptionsResponse'




  fetchSubscribersRequests:
    summary: Fetch list of topic-subscribers request.
    messages:
      protobuf:
        contentType: 'application/protobuf'
        payload:
          schemaFormat: 'application/vnd.google.protobuf;version=3'
          schema:
            $ref: './usubscription.proto#/uprotocol.core.usubscription.v3.FetchSubscribersRequest'
  fetchSubscribersResponses:
    summary: Fetch list of topic-subscribers response.
    messages:
      protobuf:
        contentType: 'application/protobuf'
        payload:
          schemaFormat: 'application/vnd.google.protobuf;version=3'
          schema:
            $ref: './usubscription.proto#/uprotocol.core.usubscription.v3.FetchSubscribersResponse'
  fetchSubscriptionsRequests:
    summary: Fetch list of subscriptions to topic/subscriber request.
    messages:
      protobuf:
        contentType: 'application/protobuf'
        payload:
          schemaFormat: 'application/vnd.google.protobuf;version=3'
          schema:
            $ref: './usubscription.proto#/uprotocol.core.usubscription.v3.FetchSubscriptionsRequest'
  fetchSubscriptionsResponses:
    summary: Fetch list of subscriptions to topic/subscriber response.
    messages:
      protobuf:
        contentType: 'application/protobuf'
        payload:
          schemaFormat: 'application/vnd.google.protobuf;version=3'
          schema:
            $ref: './usubscription.proto#/uprotocol.core.usubscription.v3.FetchSubscriptionsResponse'

operations:
  Subscribe:
    # [dsn->impl:req~usubscription-subscribe-signature~1]
    title: Susbcribe to a topic.
    summary: Register the calling client as subscriber to a topic.
    tags:
      - name: uSubscription
        description: uProtocol uSubscription API operation.
    externalDocs:
      description: uSubscription specification
      $ref: '../../../../../up-l3/usubscription/v3/README.adoc#subscribe-operation'
    channel:
      $ref: "#/channels/subscribeRequests"
    action: receive
    reply:
      channel:
        $ref: "#/channels/subscribeResponses"
    bindings:
      x-uprotocol:
        # [impl->dsn~usubscription-subscribe-method_id~1]
        methodId: 0x0001
  Unsubscribe:
    # [dsn->impl:req~usubscription-unsubscribe-signature~1]
    title: Unsubscribe from a topic.
    summary: Unregister the calling susbcriber client from a topic.
    tags:
      - name: uSubscription
        description: uProtocol uSubscription API operation.
    externalDocs:
      description: uSubscription specification
      $ref: '../../../../../up-l3/usubscription/v3/README.adoc#unsubscribe-operation'
    channel:
      $ref: "#/channels/unsubscribeRequests"
    action: receive
    reply:
      channel:
        $ref: "#/channels/unsubscribeResponses"
    bindings:
      x-uprotocol:
        # [impl->dsn~usubscription-unsubscribe-method_id~1]
        methodId: 0x0002


  FetchSubscriptions:
    title: Get subscription information, filtered by topic and/or subscribers.
    summary: Fetch subscription information, for topic or subscribers URIs passed as filtering arguments.
    tags:
      - name: uSubscription
        description: uProtocol uSubscription API operation.
    externalDocs:
      description: uSubscription specification
      $ref: '../../../../../up-l3/usubscription/v3/README.adoc#fetch-subscriptions-operation'
    channel:
      $ref: "#/channels/fetchSubscriptionsRequests"
    action: receive
    reply:
      channel:
        $ref: "#/channels/fetchSubscriptionsResponses"
    bindings:
      x-uprotocol:
        # [impl->dsn~usubscription-fetch-subscriptions-method_id~1]
        methodId: 0x0003




  FetchSubscribers:
    # [dsn->impl:req~usubscription-fetch-subscribers-signature~1]
    title: Get subscribers of a topic.
    summary: Fetch subscription information for each client currently subscribed to a given topic.
    tags:
      - name: uSubscription
        description: uProtocol uSubscription API operation.
    externalDocs:
      description: uSubscription specification
      $ref: '../../../../../up-l3/usubscription/v3/README.adoc#fetch-subscribers-operation'
    channel:
      $ref: "#/channels/fetchSubscribersRequests"
    action: receive
    reply:
      channel:
        $ref: "#/channels/fetchSubscribersResponses"
    bindings:
      x-uprotocol:
        # [impl->dsn~usubscription-fetch-subscribers-method_id~1]
        methodId: 0x0003

  FetchSubscriptions:
    # [dsn->impl:req~usubscription-fetch-subscriptions-signature~1]
    title: Get clients subscribing to a topic.
    summary: Fetch subscription information for each topic currently subscribed to by a given client.
    tags:
      - name: uSubscription
        description: uProtocol uSubscription API operation.
    externalDocs:
      description: uSubscription specification
      $ref: '../../../../../up-l3/usubscription/v3/README.adoc#fetch-subscriptions-operation'
    channel:
      $ref: "#/channels/fetchSubscriptionsRequests"
    action: receive
    reply:
      channel:
        $ref: "#/channels/fetchSubscriptionsResponses"
    bindings:
      x-uprotocol:
        # [impl->dsn~usubscription-fetch-subscriptions-method_id~1]
        methodId: 0x0004
